<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Ski Avontuur!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      border: 3px solid #444;
      image-rendering: pixelated;
      max-width: 100%;
    }
    #info {
      color: #555;
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<canvas id="c" width="800" height="450"></canvas>
<div id="info">Pijltjes: bewegen &nbsp;|&nbsp; Spatie / Pijl omhoog: springen &nbsp;|&nbsp; Enter: doorgaan &nbsp;|&nbsp; Escape: menu</div>
<script>
const W = 800, H = 450;
const GROUND = 370;
const GRAVITY = 0.55;
const JUMP_FORCE = -14;
const RAMP_FORCE = -16;
const PLAYER_W = 28;
const PLAYER_H = 44;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── PLAYER CONFIGS ────────────────────────────────────────────────────────
const PLAYERS = [
  {
    name: 'Joris',
    jacket: '#C1694F',       // terracotta
    pants: '#1A1A1A',        // zwart
    boots: '#111',
    helmet: '#808080',       // grijs
    goggleFrame: '#9E9E9E',
    goggleLens: 'rgba(30,30,30,0.75)',
    scarf: '#8B4513',
    isOnesie: false,
    desc: ['Terracotta jas', 'Zwarte broek', 'Grijze helm'],
  },
  {
    name: 'Thomas',
    jacket: '#2E7D32',       // groen onesie
    pants: '#2E7D32',        // zelfde groen
    boots: '#1A1A1A',
    helmet: '#1A1A1A',       // zwart
    goggleFrame: '#FF6F00',  // oranje
    goggleLens: 'rgba(200,80,0,0.5)',
    scarf: null,             // onesie heeft geen sjaal
    isOnesie: true,
    desc: ['Groene onesie', 'Zwarte helm', 'Oranje skibril'],
  }
];

const NPC_CONFIG = {
  jacket: '#C62828', pants: '#ECEFF1', boots: '#333',
  helmet: '#E53935', goggleFrame: '#FFD600', goggleLens: 'rgba(0,0,0,0.6)',
  scarf: '#FF6B35', isOnesie: false,
};

// ─── LEVELS ────────────────────────────────────────────────────────────────
const LEVELS = [
  {
    name: "Level 1: Zonnige Piste",
    duration: 35, startSpeed: 3.5, maxSpeed: 6,
    sky: ['#87CEEB', '#C9E8FF'],
    groundColor: '#F8FCFF', groundShadow: 'rgba(100,160,255,0.15)',
    mountainColor: '#B0C8D8', bgTreeColor: '#1B5E20',
    obstacles: ['tree', 'rock', 'penguin', 'tree', 'rock'],
    hasStars: false, hasBlizzard: false, hasClouds: false, hasRamps: false,
    stars: 1, difficultyLabel: 'Makkelijk', diffColor: '#4CAF50',
  },
  {
    name: "Level 2: Avond Afdaling",
    duration: 40, startSpeed: 5.5, maxSpeed: 9,
    sky: ['#1A0533', '#A0320A'],
    groundColor: '#EAF4FF', groundShadow: 'rgba(80,30,120,0.2)',
    mountainColor: '#4A1060', bgTreeColor: '#4A0080',
    obstacles: ['snowball', 'skiier', 'bear', 'penguin', 'snowball', 'rock'],
    hasStars: true, hasBlizzard: false, hasClouds: false, hasRamps: false,
    stars: 2, difficultyLabel: 'Gemiddeld', diffColor: '#FF9800',
  },
  {
    name: "Level 3: Nacht & Storm!",
    duration: 45, startSpeed: 7, maxSpeed: 13,
    sky: ['#03001C', '#0A0A3E'],
    groundColor: '#D8EEF8', groundShadow: 'rgba(0,30,80,0.3)',
    mountainColor: '#0D1B3E', bgTreeColor: '#050530',
    obstacles: ['pikachu', 'snorlax', 'snowball', 'bear', 'pikachu', 'tree'],
    hasStars: true, hasBlizzard: true, hasClouds: false, hasRamps: false,
    stars: 3, difficultyLabel: 'Moeilijk', diffColor: '#F44336',
  },
  {
    name: "Level 4: Bergpas Springstuk!",
    duration: 50, startSpeed: 9, maxSpeed: 15,
    sky: ['#0277BD', '#81D4FA'],
    groundColor: '#FAFEFF', groundShadow: 'rgba(0,80,160,0.12)',
    mountainColor: '#E0EEF8', bgTreeColor: '#37474F',
    obstacles: ['ramp', 'bird_ground', 'bird_air', 'ramp', 'bird_ground', 'tree', 'rock', 'bird_air', 'ramp'],
    hasStars: false, hasBlizzard: false, hasClouds: true, hasRamps: true,
    stars: 4, difficultyLabel: 'Uitdaging!', diffColor: '#9C27B0',
  }
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playerSelect | levelSelect | playing | levelComplete | gameOver | win
let levelIdx = 0;
let selectedLevel = 0;
let score = 0;
let highScore = 0;
let levelTimer = 0;
let scrollSpeed = 4;
let frameCount = 0;
let introTimer = 0;
let selectedPlayer = 0;
let currentPlayer = PLAYERS[0];
let rampFlash = 0;

// ─── PLAYER ────────────────────────────────────────────────────────────────
function makePlayer() {
  return { x: 150, y: GROUND - PLAYER_H, vy: 0, onGround: true };
}
let player = makePlayer();

// ─── OBSTACLES ─────────────────────────────────────────────────────────────
let obstacles = [];
let nextObstacleIn = 120;

// ─── BACKGROUND ────────────────────────────────────────────────────────────
let bgMountains = [], bgTrees = [], snowParticles = [], stars = [], clouds = [];

function initBackground() {
  bgMountains = [];
  for (let i = 0; i < 7; i++)
    bgMountains.push({ x: i * 160, w: 200 + Math.random() * 60, h: 80 + Math.random() * 110 });
  bgTrees = [];
  for (let i = 0; i < 18; i++)
    bgTrees.push({ x: i * 55 + Math.random() * 30, h: 28 + Math.random() * 26, speed: 1.2 + Math.random() * 0.8 });
  snowParticles = [];
  for (let i = 0; i < 80; i++)
    snowParticles.push({ x: Math.random() * W, y: Math.random() * H, size: 0.8 + Math.random() * 2.5, speed: 1 + Math.random() * 2, drift: (Math.random() - 0.5) * 0.8 });
  stars = [];
  for (let i = 0; i < 50; i++)
    stars.push({ x: Math.random() * W, y: Math.random() * (GROUND * 0.75), bright: Math.random() });
  clouds = [];
  for (let i = 0; i < 5; i++)
    clouds.push({ x: i * 200 + Math.random() * 100, y: 40 + Math.random() * 80, w: 100 + Math.random() * 80, speed: 0.4 + Math.random() * 0.4 });
}

// ─── OBSTACLE FACTORY ──────────────────────────────────────────────────────
function spawnObstacle() {
  const types = LEVELS[levelIdx].obstacles;
  const type = types[Math.floor(Math.random() * types.length)];
  let obs;
  switch (type) {
    case 'tree': {
      const sc = 0.55 + Math.random() * 0.9; // 0.55× (klein) tot 1.45× (groot)
      obs = { type, x: W+60, y: GROUND-Math.round(58*sc), w: Math.round(38*sc), h: Math.round(58*sc), scale: sc };
      break;
    }
    case 'rock':        obs = { type, x: W+60, y: GROUND-22, w: 42, h: 22 }; break;
    case 'penguin':     obs = { type, x: W+60, y: GROUND-38, w: 26, h: 38 }; break;
    case 'snowball': {
      const r = 7 + Math.floor(Math.random() * 14); // r 7 (klein) tot 20 (groot)
      obs = { type, x: W+60, y: GROUND-r*2-Math.random()*28, w: r*2, h: r*2, r, vy: 0 };
      break;
    }
    case 'skiier':      obs = { type, x: W+60, y: GROUND-PLAYER_H, w: PLAYER_W, h: PLAYER_H }; break;
    case 'bear':        obs = { type, x: W+60, y: GROUND-56, w: 52, h: 56 }; break;
    case 'pikachu':     obs = { type, x: W+60, y: GROUND-46, w: 34, h: 46 }; break;
    case 'snorlax':     obs = { type, x: W+60, y: GROUND-76, w: 76, h: 76 }; break;
    case 'ramp':        obs = { type, x: W+60, y: GROUND-38, w: 65, h: 38, used: false }; break;
    case 'bird_ground': obs = { type, x: W+60, y: GROUND-32, w: 44, h: 32 }; break;
    case 'bird_air':    obs = { type, x: W+60, y: 80 + Math.random()*90, w: 55, h: 38 }; break;
    default:            obs = { type, x: W+60, y: GROUND-40, w: 32, h: 40 };
  }
  obstacles.push(obs);
}

// ─── DRAW: SKIER ───────────────────────────────────────────────────────────
function drawSkier(x, y, jumping, config = PLAYERS[0]) {
  const c = ctx;
  const { jacket, pants, boots, helmet, goggleFrame, goggleLens, scarf } = config;
  // Skis
  c.fillStyle = '#222';
  if (jumping) {
    c.fillRect(x - 2, y + PLAYER_H - 5, 14, 4);
    c.fillRect(x + 17, y + PLAYER_H - 5, 14, 4);
  } else {
    c.fillRect(x - 5, y + PLAYER_H - 5, 38, 4);
  }
  // Legs
  c.fillStyle = pants;
  c.fillRect(x + 5, y + 26, 9, 18);
  c.fillRect(x + 15, y + 26, 9, 18);
  // Boots
  c.fillStyle = boots;
  c.fillRect(x + 5, y + 38, 9, 6);
  c.fillRect(x + 15, y + 38, 9, 6);
  // Body
  c.fillStyle = jacket;
  c.fillRect(x + 4, y + 14, 20, 14);
  // Arms
  c.fillStyle = jacket;
  if (jumping) {
    c.fillRect(x - 5, y + 13, 9, 5);
    c.fillRect(x + 24, y + 13, 9, 5);
  } else {
    c.fillRect(x - 3, y + 16, 9, 5);
    c.fillRect(x + 22, y + 16, 9, 5);
  }
  // Poles
  c.fillStyle = '#888';
  if (!jumping) {
    c.fillRect(x, y + 19, 2, 22);
    c.fillRect(x + 25, y + 19, 2, 22);
    c.fillRect(x - 2, y + 38, 6, 2);
    c.fillRect(x + 23, y + 38, 6, 2);
  }
  // Head
  c.fillStyle = '#FDBCB4';
  c.beginPath(); c.arc(x + 14, y + 9, 9, 0, Math.PI * 2); c.fill();
  // Helmet
  c.fillStyle = helmet;
  c.beginPath(); c.arc(x + 14, y + 5, 9, Math.PI, 0); c.fill();
  c.fillRect(x + 5, y + 5, 18, 5);
  // Goggles
  c.fillStyle = goggleFrame;
  c.fillRect(x + 6, y + 8, 16, 5);
  c.fillStyle = goggleLens;
  c.fillRect(x + 7, y + 8, 6, 4);
  c.fillRect(x + 15, y + 8, 6, 4);
  // Scarf
  if (scarf) {
    c.fillStyle = scarf;
    c.fillRect(x + 5, y + 14, 18, 4);
  }
}

// ─── DRAW: TREE ────────────────────────────────────────────────────────────
function drawTree(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(13, 40, 10, 18);
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(40,30); ctx.lineTo(-4,30); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#388E3C';
  ctx.beginPath(); ctx.moveTo(18,16); ctx.lineTo(42,48); ctx.lineTo(-6,48); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(240,250,255,0.85)';
  ctx.beginPath(); ctx.moveTo(18,2); ctx.lineTo(30,22); ctx.lineTo(6,22); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,18); ctx.lineTo(32,38); ctx.lineTo(4,38); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── DRAW: ROCK ────────────────────────────────────────────────────────────
function drawRock(x, y) {
  ctx.fillStyle = '#607D8B';
  ctx.beginPath(); ctx.ellipse(x+21,y+13,23,14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#78909C';
  ctx.beginPath(); ctx.ellipse(x+16,y+9,13,8,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(x+18,y+5,15,6,-0.2,Math.PI,Math.PI*2); ctx.fill();
}

// ─── DRAW: PENGUIN ─────────────────────────────────────────────────────────
function drawPenguin(x, y) {
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.ellipse(x+13,y+22,11,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#F5F5F5';
  ctx.beginPath(); ctx.ellipse(x+13,y+24,7,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.arc(x+13,y+8,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFCA28';
  ctx.beginPath(); ctx.moveTo(x+9,y+10); ctx.lineTo(x+17,y+10); ctx.lineTo(x+13,y+14); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+9,y+6,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+17,y+6,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x+9,y+6,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+17,y+6,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFCA28';
  ctx.fillRect(x+5,y+35,8,4); ctx.fillRect(x+14,y+35,8,4);
  ctx.fillStyle = '#F44336';
  ctx.fillRect(x+6,y+15,14,4);
}

// ─── DRAW: SNOWBALL ────────────────────────────────────────────────────────
function drawSnowball(x, y, r) {
  ctx.fillStyle = '#E3F2FD';
  ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(x+r-4,y+r-5,4,0,Math.PI*2); ctx.fill();
}

// ─── DRAW: BEAR ────────────────────────────────────────────────────────────
function drawBear(x, y) {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x+26,GROUND-2,24,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6D4C41';
  ctx.beginPath(); ctx.ellipse(x+26,y+40,22,18,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(x+1,y+28,10,22); ctx.fillRect(x+40,y+28,10,22);
  ctx.beginPath(); ctx.arc(x+26,y+18,16,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+13,y+5,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+39,y+5,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#A1887F';
  ctx.beginPath(); ctx.arc(x+13,y+5,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+39,y+5,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8D6E63';
  ctx.beginPath(); ctx.ellipse(x+26,y+22,9,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+20,y+15,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+32,y+15,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.arc(x+20,y+15,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+32,y+15,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+26,y+21,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4E342E';
  for (let i=0;i<3;i++) { ctx.fillRect(x+2+i*3,y+48,2,5); ctx.fillRect(x+41+i*3,y+48,2,5); }
}

// ─── DRAW: PIKACHU ─────────────────────────────────────────────────────────
function drawPikachu(x, y) {
  ctx.fillStyle = '#FFCA28';
  ctx.beginPath(); ctx.moveTo(x+30,y+20); ctx.lineTo(x+44,y+12); ctx.lineTo(x+40,y+22); ctx.lineTo(x+52,y+28); ctx.lineTo(x+38,y+28); ctx.lineTo(x+40,y+38); ctx.lineTo(x+28,y+28); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+17,y+31,14,16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+17,y+14,14,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+7,y+4); ctx.lineTo(x+2,y-14); ctx.lineTo(x+12,y-6); ctx.lineTo(x+10,y+4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+27,y+4); ctx.lineTo(x+32,y-14); ctx.lineTo(x+22,y-6); ctx.lineTo(x+24,y+4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.moveTo(x+3,y-9); ctx.lineTo(x+2,y-14); ctx.lineTo(x+12,y-6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+31,y-9); ctx.lineTo(x+32,y-14); ctx.lineTo(x+22,y-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#F44336';
  ctx.beginPath(); ctx.ellipse(x+7,y+17,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+27,y+17,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath(); ctx.arc(x+12,y+11,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+22,y+11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+13,y+10,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+23,y+10,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6D3A00';
  ctx.beginPath(); ctx.arc(x+17,y+15,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#6D3A00'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x+13,y+17); ctx.quadraticCurveTo(x+17,y+21,x+21,y+17); ctx.stroke();
  ctx.fillStyle = '#FFCA28';
  ctx.fillRect(x+9,y+43,10,5); ctx.fillRect(x+22,y+43,10,5);
}

// ─── DRAW: SNORLAX ─────────────────────────────────────────────────────────
function drawSnorlax(x, y) {
  ctx.fillStyle = '#5C6BC0';
  ctx.beginPath(); ctx.ellipse(x+38,y+52,34,26,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C5CAE9';
  ctx.beginPath(); ctx.ellipse(x+38,y+56,24,19,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5C6BC0';
  ctx.beginPath(); ctx.arc(x+38,y+24,22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+17,y+10,9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+59,y+10,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7986CB';
  ctx.beginPath(); ctx.arc(x+17,y+10,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+59,y+10,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x+24,y+20); ctx.quadraticCurveTo(x+29,y+16,x+33,y+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+43,y+20); ctx.quadraticCurveTo(x+48,y+16,x+52,y+20); ctx.stroke();
  ctx.fillStyle = '#9FA8DA';
  ctx.beginPath(); ctx.arc(x+38,y+27,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x+28,y+32); ctx.quadraticCurveTo(x+38,y+40,x+48,y+32); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillRect(x+31,y+31,6,7); ctx.fillRect(x+39,y+31,6,7);
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
  ctx.strokeRect(x+31,y+31,6,7); ctx.strokeRect(x+39,y+31,6,7);
  ctx.fillStyle = '#5C6BC0';
  ctx.beginPath(); ctx.ellipse(x+9,y+54,10,16,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+67,y+54,10,16,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+24,y+74,13,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+52,y+74,13,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3949AB';
  for (let i=0;i<3;i++) { ctx.fillRect(x+16+i*6,y+75,3,6); ctx.fillRect(x+44+i*6,y+75,3,6); }
  ctx.fillStyle = '#FFCA28';
  ctx.font = 'bold 15px monospace'; ctx.fillText('Z', x+64, y+6);
  ctx.font = 'bold 11px monospace'; ctx.fillText('z', x+70, y-1);
}

// ─── DRAW: RAMP ────────────────────────────────────────────────────────────
function drawRamp(x, y, w, h) {
  // Wood body of ramp
  ctx.fillStyle = '#8D6E63';
  ctx.beginPath();
  ctx.moveTo(x, GROUND);
  ctx.lineTo(x + w, GROUND);
  ctx.lineTo(x + w, y);
  ctx.closePath();
  ctx.fill();
  // Plank lines
  ctx.strokeStyle = '#6D4C41'; ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) {
    const px = x + (w / 4) * i;
    const py = GROUND - (h / w) * (w / 4) * i;
    ctx.beginPath(); ctx.moveTo(px, GROUND); ctx.lineTo(px, py); ctx.stroke();
  }
  // Snow on top surface
  ctx.fillStyle = '#E8F4FD';
  ctx.beginPath();
  ctx.moveTo(x, GROUND - 2);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + 6);
  ctx.lineTo(x, GROUND + 2);
  ctx.closePath();
  ctx.fill();
  // Jump arrow indicator
  ctx.fillStyle = '#FFD600';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('↑↑', x + w * 0.65, y - 6);
  ctx.textAlign = 'left';
}

// ─── DRAW: BIRD ────────────────────────────────────────────────────────────
function drawBird(x, y, type) {
  const wingFlap = Math.sin(frameCount * 0.25) * 6;
  if (type === 'bird_air') {
    // Flying eagle/hawk — body center around (x+27, y+18)
    ctx.fillStyle = '#37474F';
    // Left wing (flapping)
    ctx.beginPath();
    ctx.moveTo(x + 18, y + 16);
    ctx.quadraticCurveTo(x + 5, y + 8 - wingFlap, x - 4, y + 14 - wingFlap);
    ctx.quadraticCurveTo(x + 5, y + 20, x + 18, y + 20);
    ctx.closePath(); ctx.fill();
    // Right wing (flapping)
    ctx.beginPath();
    ctx.moveTo(x + 36, y + 16);
    ctx.quadraticCurveTo(x + 50, y + 8 - wingFlap, x + 59, y + 14 - wingFlap);
    ctx.quadraticCurveTo(x + 50, y + 20, x + 36, y + 20);
    ctx.closePath(); ctx.fill();
    // Body
    ctx.beginPath(); ctx.ellipse(x + 27, y + 18, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
    // White head
    ctx.fillStyle = '#ECEFF1';
    ctx.beginPath(); ctx.arc(x + 39, y + 14, 8, 0, Math.PI * 2); ctx.fill();
    // Eye
    ctx.fillStyle = '#F57F17';
    ctx.beginPath(); ctx.arc(x + 42, y + 13, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + 42, y + 13, 1.5, 0, Math.PI * 2); ctx.fill();
    // Beak
    ctx.fillStyle = '#F9A825';
    ctx.beginPath(); ctx.moveTo(x+46,y+14); ctx.lineTo(x+54,y+17); ctx.lineTo(x+46,y+19); ctx.closePath(); ctx.fill();
    // Tail
    ctx.fillStyle = '#37474F';
    ctx.beginPath(); ctx.moveTo(x+16,y+18); ctx.lineTo(x+4,y+22); ctx.lineTo(x+6,y+16); ctx.closePath(); ctx.fill();
  } else {
    // Ground bird — waddling eagle (bald eagle look)
    // Body
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.ellipse(x+20,y+20,16,12,0,0,Math.PI*2); ctx.fill();
    // Folded wing detail
    ctx.fillStyle = '#4E342E';
    ctx.beginPath(); ctx.ellipse(x+18,y+21,11,8,0.3,0,Math.PI*2); ctx.fill();
    // Tail
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.moveTo(x+5,y+24); ctx.lineTo(x-8,y+20); ctx.lineTo(x-5,y+28); ctx.closePath(); ctx.fill();
    // Head (white bald eagle)
    ctx.fillStyle = '#ECEFF1';
    ctx.beginPath(); ctx.arc(x+31,y+11,10,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#F57F17';
    ctx.beginPath(); ctx.arc(x+35,y+10,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x+35,y+10,1.5,0,Math.PI*2); ctx.fill();
    // Beak
    ctx.fillStyle = '#F9A825';
    ctx.beginPath(); ctx.moveTo(x+39,y+12); ctx.lineTo(x+47,y+16); ctx.lineTo(x+39,y+18); ctx.closePath(); ctx.fill();
    // Feet
    ctx.fillStyle = '#F9A825';
    ctx.fillRect(x+14,y+30,4,7); ctx.fillRect(x+22,y+30,4,7);
    ctx.fillRect(x+9,y+36,6,2); ctx.fillRect(x+14,y+36,2,2);
    ctx.fillRect(x+17,y+36,6,2); ctx.fillRect(x+22,y+36,2,2);
  }
}

// ─── DRAW OBSTACLE ─────────────────────────────────────────────────────────
function drawObstacle(obs) {
  switch (obs.type) {
    case 'tree':        drawTree(obs.x, obs.y, obs.scale || 1); break;
    case 'rock':        drawRock(obs.x, obs.y); break;
    case 'penguin':     drawPenguin(obs.x, obs.y); break;
    case 'snowball':    drawSnowball(obs.x, obs.y, obs.r || 14); break;
    case 'skiier':      drawSkier(obs.x, obs.y, false, NPC_CONFIG); break;
    case 'bear':        drawBear(obs.x, obs.y); break;
    case 'pikachu':     drawPikachu(obs.x, obs.y); break;
    case 'snorlax':     drawSnorlax(obs.x, obs.y); break;
    case 'ramp':        drawRamp(obs.x, obs.y, obs.w, obs.h); break;
    case 'bird_ground': drawBird(obs.x, obs.y, 'bird_ground'); break;
    case 'bird_air':    drawBird(obs.x, obs.y, 'bird_air'); break;
  }
}

// ─── DRAW: BACKGROUND ──────────────────────────────────────────────────────
function drawBackground() {
  const lvl = LEVELS[levelIdx];
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, lvl.sky[0]);
  grad.addColorStop(1, lvl.sky[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND);

  if (lvl.hasStars) {
    for (const s of stars) {
      const twinkle = 0.4 + s.bright * 0.6 * (0.7 + 0.3 * Math.sin(frameCount * 0.05 + s.x));
      ctx.fillStyle = `rgba(255,255,220,${twinkle})`;
      ctx.fillRect(s.x, s.y, 2, 2);
    }
  }
  if (lvl.hasClouds) {
    for (const cl of clouds) {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath(); ctx.ellipse(cl.x, cl.y, cl.w * 0.5, 18, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cl.x - cl.w * 0.2, cl.y + 6, cl.w * 0.3, 14, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cl.x + cl.w * 0.2, cl.y + 8, cl.w * 0.3, 12, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Mountains
  ctx.fillStyle = lvl.mountainColor;
  for (const m of bgMountains) {
    ctx.beginPath();
    ctx.moveTo(m.x, GROUND - 8);
    ctx.lineTo(m.x + m.w * 0.5, GROUND - m.h);
    ctx.lineTo(m.x + m.w, GROUND - 8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(220,240,255,0.6)';
    ctx.beginPath();
    ctx.moveTo(m.x + m.w * 0.5, GROUND - m.h);
    ctx.lineTo(m.x + m.w * 0.5 - 18, GROUND - m.h + 28);
    ctx.lineTo(m.x + m.w * 0.5 + 18, GROUND - m.h + 28);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = lvl.mountainColor;
  }

  for (const t of bgTrees) {
    ctx.fillStyle = lvl.bgTreeColor;
    ctx.beginPath();
    ctx.moveTo(t.x + t.h * 0.35, GROUND - t.h - 5);
    ctx.lineTo(t.x + t.h * 0.7, GROUND - 5);
    ctx.lineTo(t.x, GROUND - 5);
    ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle = lvl.groundColor;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = lvl.groundShadow;
  ctx.fillRect(0, GROUND, W, 6);

  ctx.strokeStyle = 'rgba(100,150,220,0.18)'; ctx.lineWidth = 2;
  for (let i = 0; i < 20; i++) {
    const tx = ((i * 55 - frameCount * scrollSpeed * 0.4) % W + W) % W;
    ctx.beginPath(); ctx.moveTo(tx, GROUND + 8); ctx.lineTo(tx + 16, H); ctx.stroke();
  }

  if (lvl.hasBlizzard) {
    for (const p of snowParticles) {
      ctx.fillStyle = `rgba(200,230,255,${0.4 + p.size * 0.15})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Ramp flash effect
  if (rampFlash > 0) {
    ctx.fillStyle = `rgba(255,230,0,${rampFlash / 15 * 0.35})`;
    ctx.fillRect(0, 0, W, H);
    rampFlash--;
  }
}

// ─── DRAW: LEVEL SELECT ────────────────────────────────────────────────────
function drawLevelSelect() {
  // Dark background
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.font = 'bold 30px monospace';
  ctx.fillStyle = '#FFD600';
  ctx.textAlign = 'center';
  ctx.fillText(`${currentPlayer.name} — Kies een level!`, W / 2, 46);

  const cardW = 163, cardH = 300, cardY = 68;
  const totalW = LEVELS.length * cardW + (LEVELS.length - 1) * 13;
  const startX = (W - totalW) / 2;

  for (let i = 0; i < LEVELS.length; i++) {
    const lvl = LEVELS[i];
    const cardX = startX + i * (cardW + 13);
    const sel = selectedLevel === i;

    // Sky gradient inside card
    const skyGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH * 0.62);
    skyGrad.addColorStop(0, lvl.sky[0]);
    skyGrad.addColorStop(1, lvl.sky[1]);
    ctx.fillStyle = skyGrad;
    roundRect(cardX, cardY, cardW, cardH, 10); ctx.fill();

    // Ground strip inside card
    ctx.fillStyle = lvl.groundColor;
    ctx.fillRect(cardX, cardY + cardH * 0.62, cardW, cardH * 0.38);
    // Round bottom corners
    ctx.fillStyle = lvl.groundColor;
    roundRect(cardX, cardY + cardH * 0.7, cardW, cardH * 0.3, 10); ctx.fill();

    // Border
    ctx.strokeStyle = sel ? '#FFD600' : 'rgba(255,255,255,0.18)';
    ctx.lineWidth = sel ? 4 : 1.5;
    roundRect(cardX, cardY, cardW, cardH, 10); ctx.stroke();

    // Selection glow
    if (sel) {
      ctx.shadowColor = '#FFD600';
      ctx.shadowBlur = 16;
      roundRect(cardX, cardY, cardW, cardH, 10); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Level number
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = sel ? '#FFD600' : '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${i + 1}`, cardX + cardW / 2, cardY + 24);

    // Mini skier preview (small scale)
    ctx.save();
    ctx.translate(cardX + cardW / 2 - 14, cardY + 38);
    ctx.scale(0.72, 0.72);
    drawSkier(0, 0, false, currentPlayer);
    ctx.restore();

    // Level sub-name (after colon)
    const subName = lvl.name.split(': ')[1] || lvl.name;
    const words = subName.split(' ');
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = '#fff';
    // Split into max 2 lines
    const line1 = words.slice(0, 2).join(' ');
    const line2 = words.slice(2).join(' ');
    ctx.fillText(line1, cardX + cardW / 2, cardY + 145);
    if (line2) ctx.fillText(line2, cardX + cardW / 2, cardY + 160);

    // Difficulty stars
    ctx.font = '16px monospace';
    ctx.fillStyle = lvl.diffColor;
    ctx.fillText('★'.repeat(lvl.stars) + '☆'.repeat(4 - lvl.stars), cardX + cardW / 2, cardY + 185);

    // Difficulty label
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = lvl.diffColor;
    ctx.fillText(lvl.difficultyLabel, cardX + cardW / 2, cardY + 205);

    // Speed
    ctx.font = '11px monospace';
    ctx.fillStyle = '#B0BEC5';
    ctx.fillText(`snelheid ${lvl.startSpeed}→${lvl.maxSpeed}`, cardX + cardW / 2, cardY + 223);
    ctx.fillText(`${lvl.duration}s`, cardX + cardW / 2, cardY + 238);

    // Selected indicator
    if (sel && Math.floor(frameCount / 22) % 2 === 0) {
      ctx.font = 'bold 13px monospace';
      ctx.fillStyle = '#FFD600';
      ctx.fillText('▶ START ◀', cardX + cardW / 2, cardY + cardH - 14);
    }
  }

  ctx.font = '14px monospace';
  ctx.fillStyle = '#607D8B';
  ctx.fillText('← → kiezen   |   Enter/Spatie: starten   |   Escape: terug', W / 2, H - 14);
  ctx.textAlign = 'left';
}

// ─── HELPER: ROUNDED RECT ──────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ─── COLLISION ─────────────────────────────────────────────────────────────
function collides(a, b) {
  const padX = 8, padY = 6;
  return !(
    a.x + PLAYER_W - padX < b.x + padX ||
    a.x + padX > b.x + b.w - padX ||
    a.y + PLAYER_H - padY < b.y + padY ||
    a.y + padY > b.y + b.h - padY
  );
}

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();

  // Player select navigation
  if (state === 'playerSelect') {
    if (e.code === 'ArrowLeft')  selectedPlayer = 0;
    if (e.code === 'ArrowRight') selectedPlayer = 1;
  }
  // Level select navigation
  if (state === 'levelSelect') {
    if (e.code === 'ArrowLeft')  selectedLevel = Math.max(0, selectedLevel - 1);
    if (e.code === 'ArrowRight') selectedLevel = Math.min(LEVELS.length - 1, selectedLevel + 1);
  }
  // Escape: back to level select
  if (e.code === 'Escape') {
    if (state === 'playing' || state === 'gameOver') state = 'levelSelect';
    else if (state === 'levelSelect') state = 'playerSelect';
  }
  if (e.code === 'Space' || e.code === 'Enter') handleAction();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function handleAction() {
  switch (state) {
    case 'menu':
      state = 'playerSelect';
      break;
    case 'playerSelect':
      currentPlayer = PLAYERS[selectedPlayer];
      state = 'levelSelect';
      break;
    case 'levelSelect':
      levelIdx = selectedLevel;
      startLevel();
      break;
    case 'levelComplete':
      levelIdx++;
      startLevel();
      break;
    case 'gameOver':
      state = 'levelSelect';
      break;
    case 'win':
      levelIdx = 0;
      state = 'menu';
      break;
  }
}

// ─── START LEVEL ───────────────────────────────────────────────────────────
function startLevel() {
  if (levelIdx >= LEVELS.length) { state = 'win'; return; }
  const lvl = LEVELS[levelIdx];
  scrollSpeed = lvl.startSpeed;
  levelTimer = 0;
  obstacles = [];
  nextObstacleIn = 120;
  frameCount = 0;
  introTimer = 0;
  rampFlash = 0;
  player = makePlayer();
  initBackground();
  state = 'playing';
}

// ─── UPDATE ────────────────────────────────────────────────────────────────
function update() {
  frameCount++;
  if (state === 'menu' || state === 'playerSelect' || state === 'levelSelect' || state === 'gameOver' || state === 'levelComplete' || state === 'win') return;
  if (state !== 'playing') return;

  const lvl = LEVELS[levelIdx];
  introTimer += 1/60;
  levelTimer += 1/60;
  score = Math.floor(levelTimer * 12) + levelIdx * 400;

  const t = Math.min(levelTimer / lvl.duration, 1);
  scrollSpeed = lvl.startSpeed + (lvl.maxSpeed - lvl.startSpeed) * t;

  if (levelTimer >= lvl.duration) {
    if (score > highScore) highScore = score;
    state = 'levelComplete';
    return;
  }

  // Player movement
  if (keys['ArrowLeft'])  player.x -= 4;
  if (keys['ArrowRight']) player.x += 4;
  player.x = Math.max(8, Math.min(W - PLAYER_W - 8, player.x));

  // Jump
  if ((keys['Space'] || keys['ArrowUp']) && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }

  // Gravity & vertical
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND - PLAYER_H) {
    player.y = GROUND - PLAYER_H;
    player.vy = 0;
    player.onGround = true;
  }

  // Obstacle spawn
  nextObstacleIn--;
  if (nextObstacleIn <= 0) {
    spawnObstacle();
    const minGap = Math.max(28, 80 - scrollSpeed * 4);
    nextObstacleIn = minGap + Math.floor(Math.random() * 50);
  }

  // Update obstacles
  for (const obs of obstacles) {
    obs.x -= scrollSpeed;
    if (obs.type === 'skiier') obs.x -= 1.2;
    if (obs.type === 'snowball') {
      obs.vy = (obs.vy || 0) + 0.12;
      obs.y += obs.vy;
      const ballH = obs.r ? obs.r * 2 : obs.h;
      if (obs.y + ballH >= GROUND) { obs.y = GROUND - ballH; obs.vy = -Math.abs(obs.vy) * 0.55; }
    }
    // Ramp: launch player when walked onto
    if (obs.type === 'ramp' && !obs.used && player.onGround) {
      if (player.x + PLAYER_W > obs.x + 5 && player.x < obs.x + obs.w - 5) {
        player.vy = RAMP_FORCE;
        player.onGround = false;
        obs.used = true;
        rampFlash = 15;
      }
    }
  }
  obstacles = obstacles.filter(o => o.x > -120);

  // Collision (ramps don't kill)
  for (const obs of obstacles) {
    if (obs.type === 'ramp') continue;
    if (collides(player, obs)) {
      if (score > highScore) highScore = score;
      state = 'gameOver';
      return;
    }
  }

  // Parallax
  for (const m of bgMountains) {
    m.x -= scrollSpeed * 0.25;
    if (m.x + m.w < 0) m.x = W + 20;
  }
  for (const t of bgTrees) {
    t.x -= t.speed + scrollSpeed * 0.12;
    if (t.x < -60) t.x = W + 20;
  }
  if (lvl.hasClouds) {
    for (const cl of clouds) {
      cl.x -= cl.speed;
      if (cl.x + cl.w < 0) cl.x = W + cl.w;
    }
  }
  if (lvl.hasBlizzard) {
    for (const p of snowParticles) {
      p.x += p.drift - scrollSpeed * 0.08;
      p.y += p.speed;
      if (p.y > H) { p.y = -5; p.x = Math.random() * W; }
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
    }
  }
}

// ─── DRAW ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (state === 'menu')         { drawMenu(); return; }
  if (state === 'playerSelect') { drawPlayerSelect(); return; }
  if (state === 'levelSelect')  { drawLevelSelect(); return; }
  if (state === 'win')          { drawWin(); return; }

  drawBackground();
  for (const obs of obstacles) drawObstacle(obs);
  drawSkier(player.x, player.y, !player.onGround, currentPlayer);
  drawHUD();

  if (state === 'playing' && introTimer < 2.5) drawIntro();
  if (state === 'gameOver')      drawGameOver();
  if (state === 'levelComplete') drawLevelComplete();
}

// ─── LOOP ──────────────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }

initBackground();
loop();
</script>
</body>
